services:
  shopify-scraper:
    build: .
    container_name: shopify-product-scraper
    volumes:
      - ./stores.csv:/app/stores.csv:ro
      - type: bind
        source: ${CONFIG_FILE:-./config.example.json}
        target: /app/config.json
        read_only: true
        bind:
          create_host_path: false
      - ./output:/app/output
      - ./logs:/app/logs
      - ./cache:/app/cache
    command: ["python", "scraper.py", "--input", "stores.csv", "--output", "output/products.csv"]
